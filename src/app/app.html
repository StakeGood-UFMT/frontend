<main class="main">
  <div class="content">
    <div class="header">
      <img src="https://angular.dev/assets/images/logos/angular/angular.svg" alt="Angular Logo" class="logo">
      <h1>StakeGood</h1>
    </div>
    
    <div class="status-container">
      <div class="card">
        <h2>Stellar infrastructure</h2>
        <div class="info">
          <span>Network:</span>
          <span class="badge">{{ stellarNetwork }}</span>
        </div>
        <div class="info">
          <span>Status:</span>
          <span class="status-indicator" [class]="connectionStatus()">
            {{ connectionStatus() | uppercase }}
          </span>
        </div>
      </div>
    </div>

    <p class="footer-msg">Project Setup Complete - Angular 17 + Stellar SDK</p>
  </div>
</main>

<router-outlet />
